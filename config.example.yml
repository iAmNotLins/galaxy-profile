# Galaxy Profile README Configuration
# Leonardo Vidal — @iAmNotLins

username: iAmNotLins

# Profile information displayed in the galaxy header
profile:
  name: "Leonardo Vidal"
  tagline: "DevOps Jr · Transição do Suporte"
  company: "Kirvano"
  location: "São Paulo, SP"
  bio: |
    Atuando em CI/CD, containers e AWS.
    Base em redes, suporte e governança de TI.
  philosophy: '"Automatize o que é repetitivo, monitore o que é crítico."'

# Social links displayed at the bottom of the profile
social:
  email: "leonardolinsvv17@gmail.com"
  linkedin: "leonardolinsvidal"   # ajustar se o handle do LinkedIn for diferente

# Galaxy arms — três frentes de foco ativo
# (removi Jenkins e Ansible: não estão no foco atual)
galaxy_arms:
  - name: "Containers & Linux"
    color: "synapse_cyan"
    items:
      - "Docker"
      - "Linux"
      - "Git"

  - name: "CI/CD & Automação"
    color: "axon_amber"
    items:
      - "GitHub Actions"
      - "Bash"
      - "AWS"

  - name: "Cloud & IaC"
    color: "dendrite_violet"
    items:
      - "AWS"
      - "Terraform"
      - "Cloudflare"

# Featured projects — só o metabase-deploy por ora.
# Novos projetos entram aqui à medida que forem publicados.
projects:
  - repo: "iAmNotLins/metabase-deploy"
    arm: 1  # CI/CD & Automação (também poderia ser 2 — Cloud & IaC)
    description: "Deploy do Metabase em AWS com Docker, GitHub Actions e SSM. Acesso Zero Trust via Twingate."

# Tema (mantém o mesmo — está ótimo)
theme:
  void: "#080c14"
  nebula: "#0f1623"
  star_dust: "#1a2332"
  synapse_cyan: "#00d4ff"
  dendrite_violet: "#a78bfa"
  axon_amber: "#ffb020"
  text_bright: "#f1f5f9"
  text_dim: "#94a3b8"
  text_faint: "#64748b"

# Stats configuration — mantido caso você queira reabilitar depois.
# Hoje o workflow roda em --demo e os valores saem zero.
# Por isso removemos o stats-card do README.profile.md por enquanto.
stats:
  metrics:
    - "commits"
    - "stars"
    - "prs"
    - "issues"
    - "repos"

# Language display settings
languages:
  exclude:
    - "HTML"
    - "CSS"
    - "Shell"
    - "Makefile"
  max_display: 8
